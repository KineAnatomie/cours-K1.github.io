<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QCM Hanche</title>
    <link rel="stylesheet" href="./tarif.css" />

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #2a9d8f;
        color: white;
        padding: 15px;
        text-align: center;
      }

      .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* INFOS */
      .info {
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        margin-bottom: 10px;
      }

      /* BARRE */
      #progress {
        height: 12px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 15px;
      }

      #bar {
        height: 100%;
        width: 0%;
        background: #2a9d8f;
        transition: 0.3s;
      }

      /* OPTIONS */
      .option {
        display: block;
        padding: 12px;
        margin: 10px 0;
        background: #eee;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
      }

      .option:hover {
        background: #ddd;
      }

      /* sélection */
      .sel {
        background: #2ecc71 !important;
        color: white !important;
      }

      /* bonne réponse */
      .ok {
        background: #2ecc71 !important;
        color: white !important;
      }

      /* mauvaise réponse */
      .bad {
        background: #e74c3c !important;
        color: white !important;
      }

      /* boutons */
      button {
        margin-top: 10px;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #2a9d8f;
        color: white;
        margin-right: 5px;
      }

      button:hover {
        background: #005f8d;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="./logo guinot.JPG" alt="Logo guinot" />
      </div>
      <div class="site-title">
        <h1>QCM - LA HANCHE</h1>
      </div>
      <p>
        <a href="./os coxal.html"> Anatomie</a>
      </p>
    </header>

    <div class="container">
      <div class="info">
        <div id="timer">⏱ 0s</div>
        <div id="score">✔ 0 | ❌ 0</div>
        <div id="counter"></div>
      </div>

      <div id="progress"><div id="bar"></div></div>

      <div class="card">
        <h2 id="question"></h2>
        <div id="options"></div>

        <button onclick="verifier()">Vérifier</button>
        <button onclick="precedent()">Précédent</button>
        <button onclick="suivant()">Suivant</button>
        <button onclick="recommencer()">Recommencer</button>
      </div>
    </div>

    <script>
      /* ================= QUESTIONS ================= */
      let questions = [
        {
          q: "L'articulation de la hanche unit ?",
          o: ["Tibia-fémur", "Fémur-os coxal", "Fibula-tibia"],
          a: 1,
        },
        {
          q: "Type de la hanche ?",
          o: ["Charnière", "Énarthrose", "Pivot"],
          a: 1,
        },
        {
          q: "Tête fémorale avec ?",
          o: ["Acétabulum", "Sacrum", "Tibia"],
          a: 0,
        },
        {
          q: "Acétabulum appartient ?",
          o: ["Fémur", "Os coxal", "Sacrum"],
          a: 1,
        },
        { q: "Os coxal ?", o: ["2", "3", "4"], a: 1 },
        {
          q: "L’articulation de la hanche est une articulation entre ?",
          o: ["Tibia et fémur", "Fémur et os coxal", "Fibula et tibia"],
          a: 1,
        },
        {
          q: "La hanche est une articulation de type ?",
          o: ["Charnière", "Énarthrose", "Pivot"],
          a: 1,
        },
        {
          q: "La tête fémorale s’articule avec ?",
          o: ["Acétabulum", "Sacrum", "Tibia"],
          a: 0,
        },
        {
          q: "L’acétabulum appartient à ?",
          o: ["Fémur", "Os coxal", "Sacrum"],
          a: 1,
        },
        {
          q: "L’os coxal est formé de ?",
          o: [
            "Ilion, ischion, pubis",
            "Tibia, fibula, fémur",
            "Scapula, humérus, radius",
          ],
          a: 0,
        },
        {
          q: "L’ilion est situé ?",
          o: ["En haut", "En bas", "En avant uniquement"],
          a: 0,
        },
        {
          q: "L’ischion est situé ?",
          o: ["Postéro-inférieur", "Antérieur", "Supérieur"],
          a: 0,
        },
        {
          q: "Le pubis est situé ?",
          o: ["Antérieur", "Postérieur", "Latéral uniquement"],
          a: 0,
        },
        {
          q: "Le col du fémur relie ?",
          o: ["Tête et diaphyse", "Tibia et fémur", "Acétabulum et sacrum"],
          a: 0,
        },
        {
          q: "Le grand trochanter est une partie de ?",
          o: ["Fémur", "Tibia", "Fibula"],
          a: 0,
        },
        {
          q: "Le petit trochanter est situé sur ?",
          o: ["Fémur", "Os coxal", "Sacrum"],
          a: 0,
        },
        {
          q: "L’articulation de la hanche est aussi appelée ?",
          o: [
            "Coiffe rotulienne",
            "Articulation coxo-fémorale",
            "Articulation tibio-fémorale",
          ],
          a: 1,
        },
        {
          q: "Le ligament le plus puissant de la hanche ?",
          o: [
            "Ligament ilio-fémoral",
            "Ligament croisé",
            "Ligament collatéral",
          ],
          a: 0,
        },
        {
          q: "La hanche permet principalement ?",
          o: ["Flexion uniquement", "Mouvements multiples", "Aucun mouvement"],
          a: 1,
        },
        {
          q: "L’acétabulum est formé par ?",
          o: ["Fusion de 3 os", "Un seul os", "Cartilage uniquement"],
          a: 0,
        },
        {
          q: "La tête fémorale est recouverte de ?",
          o: ["Cartilage articulaire", "Os spongieux", "Ligament"],
          a: 0,
        },
        {
          q: "Le col du fémur est ?",
          o: ["Extra-articulaire", "Intra-articulaire", "Absent"],
          a: 0,
        },
        {
          q: "La hanche supporte le poids du corps en position ?",
          o: ["Debout", "Allongée uniquement", "Assise uniquement"],
          a: 0,
        },
        {
          q: "La cavité acétabulaire est ?",
          o: ["Concave", "Convexe", "Plate"],
          a: 0,
        },
        {
          q: "Le labrum acétabulaire sert à ?",
          o: ["Stabiliser l’articulation", "Casser l’os", "Produire du sang"],
          a: 0,
        },
        {
          q: "La hanche est une articulation ?",
          o: ["Synoviale", "Fibreuse", "Cartilagineuse uniquement"],
          a: 0,
        },
        {
          q: "Le ligament rond contient ?",
          o: ["Artère de la tête fémorale", "Nerf sciatique", "Veine cave"],
          a: 0,
        },
        {
          q: "L’angle cervico-diaphysaire normal est environ ?",
          o: ["125°", "90°", "180°"],
          a: 0,
        },
        {
          q: "La coxa vara correspond à ?",
          o: [
            "Diminution de l’angle",
            "Augmentation de l’angle",
            "Absence de fémur",
          ],
          a: 0,
        },
        {
          q: "La coxa valga correspond à ?",
          o: ["Augmentation de l’angle", "Diminution de l’angle", "Luxation"],
          a: 0,
        },
        {
          q: "La luxation de hanche touche surtout ?",
          o: ["Enfant/adulte traumatisé", "Tibia", "Poignet"],
          a: 0,
        },
      ];

      /* ================= VARIABLES ================= */
      let i = 0;
      let selected = null;
      let checked = false;

      let score = 0;
      let errors = 0;
      let answers = Array(questions.length).fill(null);

      let start = Date.now();

      /* ================= AFFICHAGE ================= */
      function load() {
        let q = questions[i];

        document.getElementById("question").innerText = i + 1 + ". " + q.q;

        let html = "";

        q.o.forEach((opt, idx) => {
          let c = "option";

          /* sélection */
          if (!checked && selected === idx) {
            c = "option sel";
          }

          /* correction */
          if (checked) {
            if (idx === q.a) {
              c = "option ok";
            }
            if (selected === idx && selected !== q.a) {
              c = "option bad";
            }
          }

          html += `<div class="${c}" onclick="choose(${idx})">${opt}</div>`;
        });

        document.getElementById("options").innerHTML = html;

        updateUI();
      }

      /* ================= SELECTION ================= */
      function choose(x) {
        if (checked) return;
        selected = x;
        load();
      }

      /* ================= VERIFIER ================= */
      function verifier() {
        if (selected === null) return;

        if (answers[i] === null) {
          answers[i] = selected;

          if (selected === questions[i].a) {
            score++;
          } else {
            errors++;
          }
        }

        checked = true;
        load();
      }

      /* ================= SUIVANT ================= */
      function suivant() {
        if (i < questions.length - 1) {
          i++;
          selected = answers[i];
          checked = answers[i] !== null;
          load();
        }
      }

      /* ================= PRECEDENT ================= */
      function precedent() {
        if (i > 0) {
          i--;
          selected = answers[i];
          checked = answers[i] !== null;
          load();
        }
      }

      /* ================= UI GLOBAL ================= */
      function updateUI() {
        /* barre */
        let percent = (i / (questions.length - 1)) * 100;
        document.getElementById("bar").style.width = percent + "%";

        /* score */
        document.getElementById("score").innerText =
          "✔ " + score + " | ❌ " + errors;

        /* compteur */
        document.getElementById("counter").innerText =
          i + 1 + " / " + questions.length;
      }

      /* ================= TIMER ================= */
      setInterval(() => {
        let t = Math.floor((Date.now() - start) / 1000);
        document.getElementById("timer").innerText = "⏱ " + t + "s";
      }, 1000);

      /* ================= RESET ================= */
      function recommencer() {
        location.reload();
      }

      /* ================= START ================= */
      load();
    </script>
    <br /><br /><br /><br /><br /><br /><br />

    <footer>
      <p>2026 Anatomie | Tous droits réservés</p>

      <p>
        <a href="./os coxal.html"> Retour à la page L'os coxal </a>
      </p>
    </footer>
  </body>
</html>
