<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QCM Le femur</title>
    <link rel="stylesheet" href="./tarif.css" />

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #2a9d8f;
        color: white;
        padding: 15px;
        text-align: center;
      }

      .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* INFOS */
      .info {
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        margin-bottom: 10px;
      }

      /* BARRE */
      #progress {
        height: 12px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 15px;
      }

      #bar {
        height: 100%;
        width: 0%;
        background: #2a9d8f;
        transition: 0.3s;
      }

      /* OPTIONS */
      .option {
        display: block;
        padding: 12px;
        margin: 10px 0;
        background: #eee;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
      }

      .option:hover {
        background: #ddd;
      }

      /* sélection */
      .sel {
        background: #2ecc71 !important;
        color: white !important;
      }

      /* bonne réponse */
      .ok {
        background: #2ecc71 !important;
        color: white !important;
      }

      /* mauvaise réponse */
      .bad {
        background: #e74c3c !important;
        color: white !important;
      }

      /* boutons */
      button {
        margin-top: 10px;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #2a9d8f;
        color: white;
        margin-right: 5px;
      }

      button:hover {
        background: #005f8d;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="./logo guinot.JPG" alt="Logo guinot" />
      </div>

      <div class="site-title">
        <h3>QCM - TIBIA</h3>
      </div>
      <p>
        <a href="./tibia.html">R</a>
      </p>
    </header>

    <div class="container">
      <div class="info">
        <div id="timer">⏱ 0s</div>
        <div id="score">✔ 0 | ❌ 0</div>
        <div id="counter"></div>
      </div>

      <div id="progress"><div id="bar"></div></div>

      <div class="card">
        <h2 id="question"></h2>
        <div id="options"></div>

        <button onclick="verifier()">Vérifier</button>
        <button onclick="precedent()">Précédent</button>
        <button onclick="suivant()">Suivant</button>
        <button onclick="recommencer()">Recommencer</button>
      </div>
    </div>

    <script>
      /* ================= QUESTIONS ================= */
      let questions = [
        {
          q: "Le tibia est un os de quel membre ?",
          o: ["Membre supérieur", "Membre inférieur", "Crâne"],
          a: 1,
        },
        {
          q: "Le tibia est situé ?",
          o: [
            "En dedans de la fibula",
            "En dehors de la fibula",
            "Derrière la fibula",
          ],
          a: 0,
        },
        {
          q: "Le tibia s'articule en haut avec ?",
          o: ["Le fémur", "L'humérus", "Le radius"],
          a: 0,
        },
        {
          q: "Le tibia s'articule en bas avec ?",
          o: ["Le talus", "Le calcanéus", "Le fémur"],
          a: 0,
        },
        {
          q: "L'extrémité supérieure du tibia présente ?",
          o: ["Deux condyles", "Deux trochanters", "Deux malléoles"],
          a: 0,
        },
        {
          q: "Le condyle médial est situé ?",
          o: ["En dedans", "En dehors", "En arrière"],
          a: 0,
        },
        {
          q: "Le condyle latéral est situé ?",
          o: ["En dedans", "En dehors", "En avant"],
          a: 1,
        },
        {
          q: "Entre les condyles se trouve ?",
          o: ["L'éminence intercondylaire", "La malléole", "Le col"],
          a: 0,
        },
        {
          q: "La tubérosité tibiale sert à l'insertion du ?",
          o: ["Ligament patellaire", "Tendon d'Achille", "Biceps brachial"],
          a: 0,
        },
        {
          q: "La face antérieure du tibia est appelée ?",
          o: ["Crête tibiale", "Ligne âpre", "Acromion"],
          a: 0,
        },
        {
          q: "Le tibia est un os ?",
          o: ["Long", "Plat", "Court"],
          a: 0,
        },
        {
          q: "La diaphyse correspond à ?",
          o: [
            "La partie moyenne de l'os",
            "L'extrémité supérieure",
            "L'extrémité inférieure",
          ],
          a: 0,
        },
        {
          q: "L'extrémité inférieure du tibia forme ?",
          o: ["La malléole médiale", "La malléole latérale", "L'olécrâne"],
          a: 0,
        },
        {
          q: "La malléole médiale appartient au ?",
          o: ["Tibia", "Fibula", "Talus"],
          a: 0,
        },
        {
          q: "La malléole latérale appartient à ?",
          o: ["Fibula", "Tibia", "Fémur"],
          a: 0,
        },
        {
          q: "Le tibia supporte ?",
          o: [
            "La majorité du poids du corps",
            "Aucun poids",
            "Le poids du bras",
          ],
          a: 0,
        },
        {
          q: "Le tibia est relié à la fibula par ?",
          o: ["Membrane interosseuse", "Labrum", "Ménisque"],
          a: 0,
        },
        {
          q: "L'articulation entre tibia et fémur est ?",
          o: ["Le genou", "La hanche", "L'épaule"],
          a: 0,
        },
        {
          q: "Le tibia participe à l'articulation ?",
          o: ["De la cheville", "Du coude", "Du poignet"],
          a: 0,
        },
        {
          q: "La fracture la plus fréquente du tibia concerne souvent ?",
          o: ["La diaphyse", "Le crâne", "La scapula"],
          a: 0,
        },
        {
          q: "Le plateau tibial est situé ?",
          o: [
            "À l'extrémité supérieure",
            "À l'extrémité inférieure",
            "Au milieu",
          ],
          a: 0,
        },
        {
          q: "Le tibia est palpable facilement au niveau ?",
          o: ["De la crête tibiale", "Du condyle huméral", "Du radius"],
          a: 0,
        },
        {
          q: "Le tibia possède combien de condyles ?",
          o: ["2", "1", "3"],
          a: 0,
        },
        {
          q: "L'incisure fibulaire se situe ?",
          o: [
            "À l'extrémité inférieure du tibia",
            "Sur le fémur",
            "Sur le talus",
          ],
          a: 0,
        },
        {
          q: "Le tibia est l'os principal de ?",
          o: ["La jambe", "La cuisse", "Le pied"],
          a: 0,
        },
        {
          q: "Le tibia est situé entre ?",
          o: [
            "Le fémur et le talus",
            "L'humérus et le radius",
            "La scapula et l'humérus",
          ],
          a: 0,
        },
        {
          q: "Le tibia appartient au squelette ?",
          o: ["Appendiculaire", "Axial", "Crânien"],
          a: 0,
        },
        {
          q: "Le tibia est plus volumineux que ?",
          o: ["La fibula", "Le fémur", "Le talus"],
          a: 0,
        },
        {
          q: "L'os associé au tibia dans la jambe est ?",
          o: ["La fibula", "Le radius", "L'ulna"],
          a: 0,
        },
        {
          q: "La fonction principale du tibia est ?",
          o: [
            "Supporter et transmettre le poids",
            "Produire du sang uniquement",
            "Protéger le cerveau",
          ],
          a: 0,
        },
      ];
      /* ================= VARIABLES ================= */
      let i = 0;
      let selected = null;
      let checked = false;

      let score = 0;
      let errors = 0;
      let answers = Array(questions.length).fill(null);

      let start = Date.now();

      /* ================= AFFICHAGE ================= */
      function load() {
        let q = questions[i];

        document.getElementById("question").innerText = i + 1 + ". " + q.q;

        let html = "";

        q.o.forEach((opt, idx) => {
          let c = "option";

          /* sélection */
          if (!checked && selected === idx) {
            c = "option sel";
          }

          /* correction */
          if (checked) {
            if (idx === q.a) {
              c = "option ok";
            }
            if (selected === idx && selected !== q.a) {
              c = "option bad";
            }
          }

          html += `<div class="${c}" onclick="choose(${idx})">${opt}</div>`;
        });

        document.getElementById("options").innerHTML = html;

        updateUI();
      }

      /* ================= SELECTION ================= */
      function choose(x) {
        if (checked) return;
        selected = x;
        load();
      }

      /* ================= VERIFIER ================= */
      function verifier() {
        if (selected === null) return;

        if (answers[i] === null) {
          answers[i] = selected;

          if (selected === questions[i].a) {
            score++;
          } else {
            errors++;
          }
        }

        checked = true;
        load();
      }

      /* ================= SUIVANT ================= */
      function suivant() {
        if (i < questions.length - 1) {
          i++;
          selected = answers[i];
          checked = answers[i] !== null;
          load();
        }
      }

      /* ================= PRECEDENT ================= */
      function precedent() {
        if (i > 0) {
          i--;
          selected = answers[i];
          checked = answers[i] !== null;
          load();
        }
      }

      /* ================= UI GLOBAL ================= */
      function updateUI() {
        /* barre */
        let percent = (i / (questions.length - 1)) * 100;
        document.getElementById("bar").style.width = percent + "%";

        /* score */
        document.getElementById("score").innerText =
          "✔ " + score + " | ❌ " + errors;

        /* compteur */
        document.getElementById("counter").innerText =
          i + 1 + " / " + questions.length;
      }

      /* ================= TIMER ================= */
      setInterval(() => {
        let t = Math.floor((Date.now() - start) / 1000);
        document.getElementById("timer").innerText = "⏱ " + t + "s";
      }, 1000);

      /* ================= RESET ================= */
      function recommencer() {
        location.reload();
      }

      /* ================= START ================= */
      load();
    </script>
    <br /><br /><br /><br /><br /><br /><br />

    <footer>
      <p>2026 Anatomie | Tous droits réservés</p>

      <p>
        <a href="./tibia.html"> Retour à la page Le femur </a>
      </p>
    </footer>
  </body>
</html>
